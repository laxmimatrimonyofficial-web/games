<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neon Tic Tac Toe 🔥</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #0c0c0c;
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            touch-action: none;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            max-width: 400px;
            width: 90vw;
            text-align: center;
            z-index: 1;
        }

        .title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .game-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            color: white;
        }

        .score span {
            display: block;
            font-family: 'Orbitron', monospace;
            font-size: 1.2rem;
            color: #4ecdc4;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .cell {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-family: 'Orbitron', sans-serif;
            color: white;
            transition: 0.2s;
        }

        .cell.x { color: #ff6b6b; text-shadow: 0 0 15px #ff6b6b; }
        .cell.o { color: #4ecdc4; text-shadow: 0 0 15px #4ecdc4; }

        .controls, .mode-selector, .difficulty-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 15px;
        }

        .btn {
            padding: 10px 15px;
            border-radius: 20px;
            border: none;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        .btn-primary { background: #ff6b6b; color: white; }
        .mode-btn, .difficulty-btn { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
        .active { background: #4ecdc4 !important; color: #000 !important; }

        .game-over {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .game-over.show { display: flex; }
        .winner-text { font-family: 'Orbitron'; color: white; font-size: 2rem; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="game-container">
        <h1 class="title">NEON TIC TAC TOE</h1>
        
        <div class="mode-selector">
            <button class="btn mode-btn active" data-mode="2player">2 Player</button>
            <button class="btn mode-btn" data-mode="vsai">vs AI</button>
        </div>

        <div class="difficulty-selector" id="difficultySelector" style="display: none;">
            <button class="btn difficulty-btn active" data-difficulty="easy">Easy</button>
            <button class="btn difficulty-btn" data-difficulty="hard">Hard</button>
        </div>

        <div class="game-info">
            <div class="score"><h3>P1 (X)</h3><span id="scoreX">0</span></div>
            <div id="currentPlayer">X's Turn</div>
            <div class="score"><h3>P2 (O)</h3><span id="scoreO">0</span></div>
        </div>

        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" id="newGame">Reset Board</button>
            <button class="btn mode-btn" id="resetScores">Clear Scores</button>
        </div>
    </div>

    <div class="game-over" id="gameOver">
        <div class="winner-text" id="winnerText"></div>
        <button class="btn btn-primary" id="playAgain">Play Again</button>
    </div>

    <script>
        class TicTacToe {
            constructor() {
                this.board = Array(9).fill(null);
                this.currentPlayer = 'X';
                this.gameActive = true;
                this.scores = { X: 0, O: 0 };
                this.gameMode = '2player';
                this.difficulty = 'easy';
                this.winPatterns = [
                    [0,1,2], [3,4,5], [6,7,8],
                    [0,3,6], [1,4,7], [2,5,8],
                    [0,4,8], [2,4,6]
                ];
                this.init();
            }

            init() {
                document.querySelectorAll('.cell').forEach(cell => {
                    cell.addEventListener('click', () => this.handleMove(cell.dataset.index));
                });
                document.getElementById('newGame').onclick = () => this.resetBoard();
                document.getElementById('playAgain').onclick = () => this.resetBoard();
                document.getElementById('resetScores').onclick = () => this.clearScores();

                document.querySelectorAll('.mode-btn').forEach(btn => {
                    btn.onclick = (e) => this.setMode(e.target);
                });

                document.querySelectorAll('.difficulty-btn').forEach(btn => {
                    btn.onclick = (e) => this.setDifficulty(e.target);
                });
            }

            setMode(el) {
                this.gameMode = el.dataset.mode;
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                el.classList.add('active');
                document.getElementById('difficultySelector').style.display = this.gameMode === 'vsai' ? 'flex' : 'none';
                this.clearScores();
                this.resetBoard();
            }

            setDifficulty(el) {
                this.difficulty = el.dataset.difficulty;
                document.querySelectorAll('.difficulty-btn').forEach(b => b.classList.remove('active'));
                el.classList.add('active');
                this.resetBoard();
            }

            handleMove(index) {
                if (!this.gameActive || this.board[index]) return;

                this.makeMove(index, this.currentPlayer);

                if (this.gameActive && this.gameMode === 'vsai' && this.currentPlayer === 'O') {
                    setTimeout(() => this.aiMove(), 400);
                }
            }

            makeMove(index, player) {
                this.board[index] = player;
                const cell = document.querySelector(`[data-index="${index}"]`);
                cell.innerText = player;
                cell.classList.add(player.toLowerCase());

                if (this.checkWin(this.board, player)) {
                    this.endGame(player);
                } else if (this.board.every(cell => cell !== null)) {
                    this.endGame('Draw');
                } else {
                    this.currentPlayer = this.currentPlayer === 'X' ? 'O' : 'X';
                    document.getElementById('currentPlayer').innerText = `${this.currentPlayer}'s Turn`;
                }
            }

            aiMove() {
                let move;
                if (this.difficulty === 'hard') {
                    move = this.minimax(this.board, 'O').index;
                } else {
                    const available = this.board.map((v, i) => v === null ? i : null).filter(v => v !== null);
                    move = available[Math.floor(Math.random() * available.length)];
                }
                this.makeMove(move, 'O');
            }

            checkWin(board, player) {
                return this.winPatterns.some(pattern => {
                    return pattern.every(index => board[index] === player);
                });
            }

            minimax(newBoard, player) {
                const availSpots = newBoard.map((v, i) => v === null ? i : null).filter(v => v !== null);

                if (this.checkWin(newBoard, 'X')) return { score: -10 };
                if (this.checkWin(newBoard, 'O')) return { score: 10 };
                if (availSpots.length === 0) return { score: 0 };

                const moves = [];
                for (let i = 0; i < availSpots.length; i++) {
                    const move = {};
                    move.index = availSpots[i];
                    newBoard[availSpots[i]] = player;

                    if (player === 'O') {
                        move.score = this.minimax(newBoard, 'X').score;
                    } else {
                        move.score = this.minimax(newBoard, 'O').score;
                    }

                    newBoard[availSpots[i]] = null;
                    moves.push(move);
                }

                let bestMove;
                if (player === 'O') {
                    let bestScore = -10000;
                    for (let i = 0; i < moves.length; i++) {
                        if (moves[i].score > bestScore) {
                            bestScore = moves[i].score;
                            bestMove = i;
                        }
                    }
                } else {
                    let bestScore = 10000;
                    for (let i = 0; i < moves.length; i++) {
                        if (moves[i].score < bestScore) {
                            bestScore = moves[i].score;
                            bestMove = i;
                        }
                    }
                }
                return moves[bestMove];
            }

            endGame(winner) {
                this.gameActive = false;
                const modal = document.getElementById('gameOver');
                const text = document.getElementById('winnerText');
                modal.classList.add('show');
                
                if (winner === 'Draw') {
                    text.innerText = "It's a Tie!";
                } else {
                    text.innerText = `${winner} Wins!`;
                    this.scores[winner]++;
                    this.updateScoreDisplay();
                }
            }

            updateScoreDisplay() {
                document.getElementById('scoreX').innerText = this.scores.X;
                document.getElementById('scoreO').innerText = this.scores.O;
            }

            clearScores() {
                this.scores = { X: 0, O: 0 };
                this.updateScoreDisplay();
            }

            resetBoard() {
                this.board = Array(9).fill(null);
                this.currentPlayer = 'X';
                this.gameActive = true;
                document.getElementById('gameOver').classList.remove('show');
                document.getElementById('currentPlayer').innerText = "X's Turn";
                document.querySelectorAll('.cell').forEach(cell => {
                    cell.innerText = '';
                    cell.classList.remove('x', 'o');
                });
            }
        }

        new TicTacToe();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🏆 Professional Carrom Board - Full Featured</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600;700&display=swap');
        
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none; -webkit-user-select: none;
            touch-action: manipulation;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 20% 80%, rgba(120,119,198,0.3) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(255,119,198,0.3) 0%, transparent 50%);
            z-index: -1;
            animation: bgShift 20s ease-in-out infinite alternate;
        }

        @keyframes bgShift {
            0% { transform: scale(1) rotate(0deg); }
            100% { transform: scale(1.1) rotate(1deg); }
        }

        .game-container {
            width: 100%; max-width: 800px;
            background: rgba(15,15,35,0.95);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 25px;
            box-shadow: 
                0 25px 50px rgba(0,0,0,0.5),
                inset 0 1px 0 rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
        }

        .game-container::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, transparent 40%, rgba(255,255,255,0.03) 50%);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0,0) rotate(0deg); }
            33% { transform: translate(30px,-30px) rotate(120deg); }
            66% { transform: translate(-20px,20px) rotate(240deg); }
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Orbitron', monospace;
            font-size: clamp(2rem, 6vw, 3.5rem);
            background: linear-gradient(45deg, #FFD700, #FFA500, #FF6B35);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(255,215,0,0.5);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .scoreboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 20px 0;
            padding: 25px;
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .player-panel {
            text-align: center;
            padding: 15px;
        }

        .player-name {
            font-size: clamp(1rem, 3vw, 1.3rem);
            font-weight: 700;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .player-active {
            color: #00FF88 !important;
            text-shadow: 0 0 15px #00FF88;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .score-display {
            font-family: 'Orbitron', monospace;
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 900;
            background: linear-gradient(45deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 25px rgba(255,215,0,0.6);
        }

        .game-status {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            font-size: clamp(1rem, 3vw, 1.2rem);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .status-highlight {
            color: #00FF88;
            font-weight: 700;
            text-shadow: 0 0 10px #00FF88;
        }

        canvas {
            width: 100%;
            max-width: 700px;
            height: 700px;
            max-height: 70vh;
            display: block;
            margin: 0 auto 20px;
            border: 20px solid transparent;
            border-image: linear-gradient(45deg, #D2691E, #8B4513, #A0522D) 1;
            border-radius: 35px;
            box-shadow: 
                inset 0 0 40px rgba(0,0,0,0.6),
                0 20px 50px rgba(0,0,0,0.6),
                0 0 50px rgba(255,215,0,0.2);
            cursor: grab;
            image-rendering: optimizeSpeed;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
        }

        canvas:active { cursor: grabbing; }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 20px 0;
        }

        .btn {
            padding: 15px 30px;
            font-size: clamp(1rem, 2.5vw, 1.1rem);
            font-weight: 600;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            min-height: 55px;
            min-width: 140px;
            font-family: 'Orbitron', monospace;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(145deg, #00D4FF, #0099CC);
            box-shadow: 0 10px 30px rgba(0,212,255,0.4);
            color: white;
        }

        .btn-secondary {
            background: linear-gradient(145deg, #FF6B6B, #FF5252);
            box-shadow: 0 10px 30px rgba(255,107,107,0.4);
            color: white;
        }

        .btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .btn:active {
            transform: translateY(-2px) scale(1.02);
        }

        .btn:disabled {
            background: #444;
            transform: none;
            cursor: not-allowed;
            box-shadow: none;
        }

        .game-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .info-card {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        @media (max-width: 768px) {
            body { padding: 5px; }
            .game-container { padding: 20px 15px; margin: 5px; }
            canvas { max-height: 65vh; border-width: 15px; }
            .controls { flex-direction: column; align-items: center; }
            .btn { width: 100%; max-width: 280px; }
            .scoreboard { grid-template-columns: 1fr; gap: 15px; }
        }

        @media (max-width: 480px) {
            .game-container { padding: 15px 10px; }
            h1 { font-size: 2rem; }
        }

        .power-meter {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 200px;
            background: rgba(0,0,0,0.7);
            border-radius: 30px;
            padding: 10px;
            display: none;
        }

        .power-fill {
            width: 100%;
            height: 0%;
            background: linear-gradient(180deg, #FF6B6B, #FFD700);
            border-radius: 20px;
            transition: height 0.1s;
            box-shadow: 0 0 20px rgba(255,107,107,0.6);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>🏓 CARROM PRO</h1>
            <div style="font-size: 1.1rem; opacity: 0.8;">Professional Tournament Edition</div>
        </div>

        <div class="scoreboard">
            <div class="player-panel">
                <div class="player-name" id="p1Name">🇮🇳 Player 1</div>
                <div class="score-display" id="p1Score">0</div>
            </div>
            <div class="player-panel">
                <div class="player-name" id="p2Name">🇺🇸 Player 2</div>
                <div class="score-display" id="p2Score">0</div>
            </div>
        </div>

        <div class="game-status">
            <div><strong>Current Turn:</strong> <span class="status-highlight" id="currentTurn">Player 1</span></div>
            <div id="gameMsg">🎯 Touch & drag the <strong>GOLD STRIKER</strong> to shoot!</div>
            <div id="multiplierMsg" style="display:none; color:#FFD700; font-weight:700;">⚡ Multiplier Active!</div>
        </div>

        <canvas id="carromBoard"></canvas>

        <div class="controls">
            <button class="btn btn-primary" onclick="newGame()">🔄 New Game</button>
            <button class="btn btn-secondary" onclick="togglePause()" id="pauseBtn">⏸️ Pause</button>
            <button class="btn btn-primary" onclick="toggleSound()" id="soundBtn">🔊 Sound On</button>
        </div>

        <div class="game-info">
            <div class="info-card">
                <div style="font-size:1.2rem; color:#00FF88;">⏱️ Coins Left: <span id="coinsLeft">19</span></div>
            </div>
            <div class="info-card">
                <div style="font-size:1.2rem; color:#FFD700;">⚡ Multiplier: <span id="multiplier">x1</span></div>
            </div>
            <div class="info-card">
                <div>Total Score: <span id="totalScore" style="color:#00FF88;">0</span></div>
            </div>
        </div>
    </div>

    <script>
        // Audio Context for sound effects
        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }
        function playSound(frequency, duration, type='sine') {
            initAudio();
            let oscillator = audioCtx.createOscillator();
            let gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.frequency.value = frequency;
            oscillator.type = type;
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + duration);
        }

        const ctx = canvas.getContext('2d');

            centerY = canvas.height / 2;
            boardRadius = canvas.width * 0.38;

            setupPockets();
            initCoins();
